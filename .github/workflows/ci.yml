name: CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:
  verify:
    name: Lint • Type Check • Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build